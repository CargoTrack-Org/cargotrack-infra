name: Terraform — Validate, Plan & Apply

# ─── Triggers ─────────────────────────────────────────────────────────────────
# This workflow lives in cargotrack-infra repo.
# Triggers on changes to any .tf file or the workflow itself.
on:
  push:
    branches: [main]
    paths:
      - 'cargotrack-infra/**'
      - '.github/workflows/terraform-apply.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cargotrack-infra/**'
  workflow_dispatch:

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  id-token: write        # OIDC → AWS
  contents: read
  pull-requests: write   # Post plan output as PR comment
  security-events: write # Upload tfsec SARIF

env:
  TF_WORKING_DIR: cargotrack-infra/environments/dev
  AWS_REGION: us-east-1

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: tfsec — Terraform security scan
  # ════════════════════════════════════════════════════════════════════════════
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sL \
            https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec
          tfsec --version

      - name: Run tfsec and write SARIF to disk
        run: |
          tfsec cargotrack-infra \
            --format sarif \
            --soft-fail \
            --exclude-downloaded-modules \
            --minimum-severity MEDIUM \
            --out results.sarif || true
          ls -la results.sarif

      - name: Upload tfsec SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: tfsec

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Terraform Validate & Plan
  # ════════════════════════════════════════════════════════════════════════════
  terraform-plan:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    needs: [tfsec]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -no-color \
            -refresh=false \
            -lock=false \
            2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [truncated — see Actions logs for full output]'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`cargotrack-infra/environments/dev\`\n\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: Terraform Apply — requires manual approval via GitHub Environment
  #
  # HOW THE APPROVAL GATE WORKS:
  #   1. This job targets the "production" GitHub Environment
  #   2. Go to cargotrack-infra repo → Settings → Environments → production
  #   3. Add "Required reviewers" (your GitHub username)
  #   4. When this job is reached, GitHub pauses and emails you for approval
  #   5. Approve in the GitHub UI → terraform apply runs
  #
  # Only runs on push to main (not on PRs — PRs only plan).
  # ════════════════════════════════════════════════════════════════════════════
  terraform-apply:
    name: Terraform Apply (requires approval)
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # ← This is the manual approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Grant Terraform CI role EKS cluster-admin access ─────────────────────
      # WHY THIS STEP EXISTS:
      #   The Terraform Kubernetes/Helm/kubectl providers call the EKS Kubernetes
      #   API (k8s.tf resources). The EKS cluster must recognise the CI IAM role
      #   as a cluster admin, otherwise all k8s resource operations fail with:
      #     Error: Unauthorized
      #
      # WHY NOT IN Terraform state:
      #   Granting EKS access IN Terraform creates a chicken-and-egg: Terraform
      #   needs EKS access to apply, but EKS access is created by the apply.
      #   Putting it in a workflow pre-step breaks the cycle.
      #
      # IDEMPOTENCY:
      #   All AWS CLI calls here are idempotent. Errors caused by
      #   "already exists" are suppressed with 2>/dev/null || true.
      #   The cluster mode upgrade only runs when currently in CONFIG_MAP mode.
      - name: Grant CI role EKS cluster-admin access (idempotent)
        run: |
          set -euo pipefail
          CLUSTER=cargotrack
          REGION=us-east-1
          ROLE_ARN=arn:aws:iam::692828329130:role/cargotrack-terraform-role
          POLICY_ARN=arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy

          echo "==> Step 1: Check cluster authentication mode"
          CURRENT_MODE=$(aws eks describe-cluster \
            --name "$CLUSTER" --region "$REGION" \
            --query 'cluster.accessConfig.authenticationMode' \
            --output text 2>/dev/null || echo "CONFIG_MAP")
          echo "    Current mode: $CURRENT_MODE"

          if [ "$CURRENT_MODE" = "CONFIG_MAP" ]; then
            echo "==> Upgrading cluster to API_AND_CONFIG_MAP auth mode..."
            aws eks update-cluster-config \
              --name "$CLUSTER" \
              --access-config authenticationMode=API_AND_CONFIG_MAP \
              --region "$REGION"
            echo "    Waiting for cluster update to complete (max 5 min)..."
            for i in $(seq 1 30); do
              STATUS=$(aws eks describe-cluster \
                --name "$CLUSTER" --region "$REGION" \
                --query cluster.status --output text)
              echo "    Attempt $i/30 — cluster status: $STATUS"
              [ "$STATUS" = "ACTIVE" ] && break
              sleep 10
            done
          else
            echo "    Cluster is already in $CURRENT_MODE mode — no upgrade needed."
          fi

          echo "==> Step 2: Create EKS access entry for Terraform CI role"
          aws eks create-access-entry \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --type STANDARD \
            --region "$REGION" 2>/dev/null \
            && echo "    Access entry created." \
            || echo "    Access entry already exists — skipping."

          echo "==> Step 3: Associate AmazonEKSClusterAdminPolicy"
          aws eks associate-access-policy \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --policy-arn "$POLICY_ARN" \
            --access-scope type=cluster \
            --region "$REGION" 2>/dev/null \
            && echo "    Policy associated." \
            || echo "    Policy already associated — skipping."

          echo "==> EKS cluster-admin access setup complete."

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve
          echo "✅ Terraform apply complete"
