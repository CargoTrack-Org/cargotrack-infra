name: Terraform — Validate, Plan & Apply

on:
  push:
    branches: [main]
    paths:
      - 'cargotrack-infra/**'
      - '.github/workflows/terraform-apply.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cargotrack-infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_WORKING_DIR: cargotrack-infra/environments/dev
  AWS_REGION: us-east-1

jobs:
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sL \
            https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec
          tfsec --version

      - name: Run tfsec and write SARIF to disk
        run: |
          tfsec cargotrack-infra \
            --format sarif \
            --soft-fail \
            --exclude-downloaded-modules \
            --minimum-severity MEDIUM \
            --out results.sarif || true
          ls -la results.sarif

      - name: Upload tfsec SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: tfsec

  terraform-plan:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    needs: [tfsec]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -no-color \
            -refresh=false \
            -lock=false \
            2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [truncated — see Actions logs for full output]'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`cargotrack-infra/environments/dev\`\n\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  terraform-apply:
    name: Terraform Apply (requires approval)
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Grant CI role EKS cluster-admin access (idempotent)
        run: |
          set -euo pipefail
          CLUSTER=cargotrack
          REGION=us-east-1
          ROLE_ARN=arn:aws:iam::692828329130:role/cargotrack-terraform-role
          POLICY_ARN=arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy

          echo "==> Step 1: Check cluster authentication mode"
          CURRENT_MODE=$(aws eks describe-cluster \
            --name "$CLUSTER" --region "$REGION" \
            --query 'cluster.accessConfig.authenticationMode' \
            --output text 2>/dev/null || echo "CONFIG_MAP")
          echo "    Current mode: $CURRENT_MODE"

          if [ "$CURRENT_MODE" = "CONFIG_MAP" ]; then
            echo "==> Upgrading cluster to API_AND_CONFIG_MAP auth mode..."
            UPDATE_ID=$(aws eks update-cluster-config \
              --name "$CLUSTER" \
              --access-config authenticationMode=API_AND_CONFIG_MAP \
              --region "$REGION" \
              --query 'update.id' \
              --output text)
            echo "    Update ID: $UPDATE_ID"
            echo "    Waiting for auth mode to become API_AND_CONFIG_MAP (max 5 min)..."
            for i in $(seq 1 30); do
              AUTH_MODE=$(aws eks describe-cluster \
                --name "$CLUSTER" --region "$REGION" \
                --query 'cluster.accessConfig.authenticationMode' \
                --output text)
              UPDATE_STATUS=$(aws eks describe-update \
                --name "$CLUSTER" \
                --update-id "$UPDATE_ID" \
                --region "$REGION" \
                --query 'update.status' \
                --output text 2>/dev/null || echo "Unknown")
              echo "    Attempt $i/30 — auth mode: $AUTH_MODE | update: $UPDATE_STATUS"
              [ "$AUTH_MODE" = "API_AND_CONFIG_MAP" ] && echo "    Auth mode confirmed." && break
              if [ "$UPDATE_STATUS" = "Failed" ] || [ "$UPDATE_STATUS" = "Cancelled" ]; then
                echo "ERROR: EKS auth mode update $UPDATE_STATUS — cannot proceed"
                exit 1
              fi
              sleep 10
            done
            FINAL_MODE=$(aws eks describe-cluster \
              --name "$CLUSTER" --region "$REGION" \
              --query 'cluster.accessConfig.authenticationMode' --output text)
            if [ "$FINAL_MODE" != "API_AND_CONFIG_MAP" ]; then
              echo "ERROR: Auth mode is still $FINAL_MODE after waiting. Aborting."
              exit 1
            fi
          else
            echo "    Cluster is already in $CURRENT_MODE mode — no upgrade needed."
          fi

          echo "==> Step 2: Create EKS access entry for Terraform CI role"
          aws eks create-access-entry \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --type STANDARD \
            --region "$REGION" 2>/dev/null \
            && echo "    Access entry created." \
            || echo "    Access entry already exists — skipping."

          echo "==> Step 3: Associate AmazonEKSClusterAdminPolicy"
          aws eks associate-access-policy \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --policy-arn "$POLICY_ARN" \
            --access-scope type=cluster \
            --region "$REGION" 2>/dev/null \
            && echo "    Policy associated." \
            || echo "    Policy already associated — skipping."

          echo "==> EKS cluster-admin access setup complete."

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve
          echo "✅ Terraform apply complete"
